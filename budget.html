<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Budget — Our Compass</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    .budget-wrap { padding: 24px; max-width: 900px; margin: 0 auto; }
    .budget-toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
    .budget-summary {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 28px;
    }
    .summary-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px 20px;
    }
    .summary-card .label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 6px; }
    .summary-card .value { font-size: 1.5rem; font-weight: 700; }
    .budget-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
    .budget-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 18px;
    }
    .budget-card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 10px; }
    .budget-name { font-size: 15px; font-weight: 600; }
    .budget-cat {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.5px; padding: 2px 8px; border-radius: 4px;
    }
    .cat-holiday  { background: rgba(78,205,196,0.2); color: var(--accent2); }
    .cat-project  { background: rgba(108,99,255,0.2); color: var(--accent); }
    .cat-home     { background: rgba(255,169,77,0.2); color: var(--warn); }
    .cat-personal { background: rgba(105,219,124,0.2); color: var(--success); }
    .cat-other    { background: rgba(123,130,160,0.2); color: var(--text-muted); }
    .progress-bar {
      height: 8px; background: var(--surface2); border-radius: 4px;
      overflow: hidden; margin: 10px 0 6px;
    }
    .progress-fill { height: 100%; border-radius: 4px; transition: width 0.4s; }
    .budget-amounts { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-muted); }
    .budget-amounts .spent { font-weight: 600; color: var(--text); }
    .expense-list { margin-top: 12px; border-top: 1px solid var(--border); padding-top: 10px; }
    .expense-row { display: flex; align-items: center; justify-content: space-between; font-size: 12px; padding: 4px 0; }
    .expense-row .exp-label { color: var(--text-muted); }
    .expense-row .exp-amount { font-weight: 600; }
    .add-expense-row { display: flex; gap: 6px; margin-top: 8px; }
    .add-expense-row input { flex: 1; font-size: 12px; padding: 6px 8px; }
    .priority-badge {
      font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 4px;
      text-transform: uppercase; letter-spacing: 0.4px;
    }
    .p-high   { background: rgba(255,107,107,0.2); color: var(--danger); }
    .p-medium { background: rgba(255,169,77,0.2);  color: var(--warn); }
    .p-low    { background: rgba(123,130,160,0.2); color: var(--text-muted); }
    .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
    @media (max-width: 600px) {
      .budget-summary { grid-template-columns: 1fr; }
    }
  </style>
  <link rel="manifest" href="/hidden-graham/manifest.json">
  <meta name="theme-color" content="#6c63ff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Our Compass">
  <link rel="apple-touch-icon" href="/hidden-graham/icons/icon.svg">
  <script type="module" src="/hidden-graham/js/pwa.js"></script>
  <script type="module" src="/hidden-graham/js/nav.js"></script>
</head>
<body>

<nav>
  <span class="logo">🧭 Our Compass</span>
  <button class="nav-hamburger" id="nav-hamburger" aria-label="Menu">☰</button>
  <div class="nav-right">
    <a href="dashboard.html" class="btn btn-ghost btn-sm">Home</a>
    <a href="app.html"       class="btn btn-ghost btn-sm">Goals</a>
    <a href="events.html"    class="btn btn-ghost btn-sm">Events</a>
    <a href="budget.html"    class="btn btn-ghost btn-sm" style="color:var(--accent)">Budget</a>
    <a href="decisions.html" class="btn btn-ghost btn-sm">Decisions</a>
    <a href="settings.html" class="btn btn-ghost btn-icon" title="Settings">⚙</a>
    <div class="user-avatar" id="user-avatar"></div>
    <button class="btn btn-ghost btn-sm" id="btn-signout">Sign out</button>
  </div>
</nav>
<div id="nav-mobile-menu" class="nav-mobile-menu">
  <a href="dashboard.html" class="btn btn-ghost btn-sm">🏠 Home</a>
  <a href="app.html" class="btn btn-ghost btn-sm">🎯 Goals</a>
  <a href="events.html" class="btn btn-ghost btn-sm">📅 Events</a>
  <a href="budget.html" class="btn btn-ghost btn-sm">💰 Budget</a>
  <a href="decisions.html" class="btn btn-ghost btn-sm">🤔 Decisions</a>
  <a href="settings.html" class="btn btn-ghost btn-sm">⚙️ Settings</a>
  <button class="btn btn-ghost btn-sm" id="mobile-signout">Sign out</button>
</div>

<div class="budget-wrap">
  <div class="budget-toolbar">
    <div>
      <h2 style="font-size:1.2rem;font-weight:700">Budget Tracker</h2>
      <div style="font-size:12px;color:var(--text-muted);margin-top:2px">Track spending for holidays, projects and goals</div>
    </div>
    <button class="btn btn-primary" id="btn-add-budget">+ Add Budget</button>
  </div>

  <!-- Summary totals -->
  <div class="budget-summary" id="budget-summary">
    <div class="summary-card">
      <div class="label">Total Budgeted</div>
      <div class="value" id="total-budgeted">$0</div>
    </div>
    <div class="summary-card">
      <div class="label">Total Spent</div>
      <div class="value" id="total-spent">$0</div>
    </div>
    <div class="summary-card">
      <div class="label">Remaining</div>
      <div class="value" id="total-remaining">$0</div>
    </div>
  </div>

  <div class="budget-grid" id="budget-grid">
    <div class="empty-state">Loading…</div>
  </div>
</div>

<!-- Add / Edit Budget modal -->
<div class="modal-backdrop hidden" id="modal-backdrop">
  <div class="modal">
    <h3 id="modal-title">Add Budget</h3>
    <form id="budget-form">
      <div class="form-group">
        <label>Name *</label>
        <input type="text" id="f-name" placeholder="e.g. Bali 2026, Kitchen Reno" required>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Category</label>
          <select id="f-cat">
            <option value="holiday">🌴 Holiday</option>
            <option value="project">🛠 Project</option>
            <option value="home">🏠 Home</option>
            <option value="personal">👤 Personal</option>
            <option value="other">📌 Other</option>
          </select>
        </div>
        <div class="form-group">
          <label>Priority</label>
          <select id="f-priority">
            <option value="high">🔴 High</option>
            <option value="medium">🟡 Medium</option>
            <option value="low">⚫ Low</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Total Budget ($) *</label>
          <input type="number" id="f-target" min="0" step="1" placeholder="5000" required>
        </div>
        <div class="form-group">
          <label>Target Date (optional)</label>
          <input type="date" id="f-date">
        </div>
      </div>
      <div class="form-group">
        <label>Notes (optional)</label>
        <textarea id="f-notes" placeholder="What's this budget for?"></textarea>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-secondary" id="modal-cancel">Cancel</button>
        <button type="submit" class="btn btn-primary">Save</button>
      </div>
    </form>
  </div>
</div>

<div id="toast" class="hidden"></div>

<script src="firebase-config.js"></script>
<script type="module">
  import { initFirebase, onAuth, signOutUser } from "./js/auth.js";
  import { subscribeBudgets, addBudget, updateBudget, deleteBudget } from "./js/db.js";

  initFirebase();

  let _budgets = [];
  let _editId  = null;

  onAuth(user => {
    if (!user) { window.location.href = "index.html"; return; }
    document.getElementById("user-avatar").textContent =
      (user.displayName || user.email).split(" ").slice(0,2).map(w=>w[0].toUpperCase()).join("");
    subscribeBudgets(budgets => { _budgets = budgets; _render(); });
  });

  document.getElementById("btn-signout").addEventListener("click", signOutUser);
  document.getElementById("btn-add-budget").addEventListener("click", () => _openModal(null));
  document.getElementById("modal-cancel").addEventListener("click", _closeModal);
  document.getElementById("modal-backdrop").addEventListener("click", e => {
    if (e.target === e.currentTarget) _closeModal();
  });
  document.getElementById("budget-form").addEventListener("submit", _handleSave);

  function _render() {
    const grid = document.getElementById("budget-grid");

    // Summary
    const totalBudgeted  = _budgets.reduce((s, b) => s + (b.target || 0), 0);
    const totalSpent     = _budgets.reduce((s, b) => s + (b.spent  || 0), 0);
    const totalRemaining = totalBudgeted - totalSpent;
    document.getElementById("total-budgeted").textContent  = _fmt(totalBudgeted);
    document.getElementById("total-spent").textContent     = _fmt(totalSpent);
    const remEl = document.getElementById("total-remaining");
    remEl.textContent  = _fmt(Math.abs(totalRemaining));
    remEl.style.color  = totalRemaining < 0 ? "var(--danger)" : "var(--success)";

    if (!_budgets.length) {
      grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">No budgets yet — add your first one!</div>`;
      return;
    }

    // Sort by priority then name
    const order = { high: 0, medium: 1, low: 2 };
    const sorted = [..._budgets].sort((a,b) => (order[a.priority]||1) - (order[b.priority]||1));

    grid.innerHTML = sorted.map(b => _cardHTML(b)).join("");

    grid.querySelectorAll(".btn-edit-b").forEach(btn => {
      btn.addEventListener("click", () => _openModal(_budgets.find(b => b.id === btn.dataset.id)));
    });
    grid.querySelectorAll(".btn-del-b").forEach(btn => {
      btn.addEventListener("click", async () => {
        const b = _budgets.find(b => b.id === btn.dataset.id);
        if (confirm(`Delete "${b.name}"?`)) await deleteBudget(b.id);
      });
    });
    grid.querySelectorAll(".btn-add-exp").forEach(btn => {
      btn.addEventListener("click", () => _addExpense(btn.dataset.id));
    });
  }

  function _cardHTML(b) {
    const pct      = b.target ? Math.min(100, Math.round((b.spent||0) / b.target * 100)) : 0;
    const over     = (b.spent||0) > (b.target||0);
    const fillColor = over ? "var(--danger)" : pct > 75 ? "var(--warn)" : "var(--success)";
    const expenses  = b.expenses || [];

    return `
      <div class="budget-card">
        <div class="budget-card-top">
          <div>
            <div class="budget-name">${_esc(b.name)}</div>
            <div style="display:flex;gap:6px;margin-top:4px">
              <span class="budget-cat cat-${b.category||"other"}">${b.category||"other"}</span>
              <span class="priority-badge p-${b.priority||"medium"}">${b.priority||"medium"}</span>
            </div>
          </div>
          <div style="display:flex;gap:4px">
            <button class="btn btn-ghost btn-icon btn-edit-b" data-id="${b.id}" title="Edit">✎</button>
            <button class="btn btn-ghost btn-icon btn-del-b"  data-id="${b.id}" title="Delete">✕</button>
          </div>
        </div>

        <div class="progress-bar">
          <div class="progress-fill" style="width:${pct}%;background:${fillColor}"></div>
        </div>
        <div class="budget-amounts">
          <span class="spent">${_fmt(b.spent||0)} spent</span>
          <span>of ${_fmt(b.target||0)}</span>
          <span style="color:${over?"var(--danger)":"var(--text-muted)"}">${over ? _fmt((b.spent||0)-(b.target||0))+" over" : _fmt((b.target||0)-(b.spent||0))+" left"}</span>
        </div>

        ${b.targetDate ? `<div style="font-size:11px;color:var(--text-muted);margin-top:6px">📅 Target: ${b.targetDate}</div>` : ""}
        ${b.notes      ? `<div style="font-size:12px;color:var(--text-muted);margin-top:6px">${_esc(b.notes)}</div>` : ""}

        <div class="expense-list">
          ${expenses.slice(-5).map(ex => `
            <div class="expense-row">
              <span class="exp-label">${_esc(ex.label)}</span>
              <span class="exp-amount">${_fmt(ex.amount)}</span>
            </div>`).join("")}
          <div class="add-expense-row">
            <input type="text"   class="exp-label-in" placeholder="What for?" style="flex:2">
            <input type="number" class="exp-amount-in" placeholder="$" min="0" step="1" style="flex:1">
            <button type="button" class="btn btn-secondary btn-sm btn-add-exp" data-id="${b.id}">Add</button>
          </div>
        </div>
      </div>`;
  }

  async function _addExpense(id) {
    const card    = document.querySelector(`.btn-add-exp[data-id="${id}"]`).closest(".budget-card");
    const label   = card.querySelector(".exp-label-in").value.trim();
    const amount  = parseFloat(card.querySelector(".exp-amount-in").value);
    if (!label || isNaN(amount) || amount <= 0) return;

    const budget   = _budgets.find(b => b.id === id);
    const expenses = [...(budget.expenses || []), { label, amount, date: new Date().toISOString().slice(0,10) }];
    const spent    = expenses.reduce((s, e) => s + e.amount, 0);
    await updateBudget(id, { expenses, spent });
  }

  function _openModal(b) {
    _editId = b?.id || null;
    document.getElementById("modal-title").textContent = b ? "Edit Budget" : "Add Budget";
    document.getElementById("f-name").value     = b?.name       || "";
    document.getElementById("f-cat").value      = b?.category   || "holiday";
    document.getElementById("f-priority").value = b?.priority   || "medium";
    document.getElementById("f-target").value   = b?.target     || "";
    document.getElementById("f-date").value     = b?.targetDate || "";
    document.getElementById("f-notes").value    = b?.notes      || "";
    document.getElementById("modal-backdrop").classList.remove("hidden");
    document.getElementById("f-name").focus();
  }

  function _closeModal() {
    document.getElementById("modal-backdrop").classList.add("hidden");
    _editId = null;
  }

  async function _handleSave(e) {
    e.preventDefault();
    const payload = {
      name:       document.getElementById("f-name").value.trim(),
      category:   document.getElementById("f-cat").value,
      priority:   document.getElementById("f-priority").value,
      target:     parseFloat(document.getElementById("f-target").value) || 0,
      targetDate: document.getElementById("f-date").value || null,
      notes:      document.getElementById("f-notes").value.trim() || null,
    };
    if (_editId) await updateBudget(_editId, payload);
    else         await addBudget(payload);
    _closeModal();
  }

  function _fmt(n) { return "$" + Number(n).toLocaleString("en-AU", { minimumFractionDigits: 0 }); }
  function _esc(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
</script>
</body>
</html>
